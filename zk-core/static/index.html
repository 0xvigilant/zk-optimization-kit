<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>zk-optimization-kit // edge prover</title>
<style>
  :root {
    --bg: #0a0a0a;
    --green: #33ff66;
    --accent: #39FF14;
    --dim: #1d6b34;
    --red: #ff4d4d;
    --panel: #0e1410;
    --border: #144a26;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--green);
    font-family: "DejaVu Sans Mono", "Liberation Mono", "Courier New", monospace;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }
  /* subtle CRT scanlines + flicker */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0, 0, 0, 0) 0px,
      rgba(0, 0, 0, 0) 2px,
      rgba(0, 0, 0, 0.25) 3px,
      rgba(0, 0, 0, 0.25) 3px
    );
    z-index: 9999;
    opacity: 0.5;
  }
  .wrap {
    max-width: 820px;
    margin: 0 auto;
    padding: 28px 18px 60px;
  }
  header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 14px;
    margin-bottom: 22px;
  }
  h1 {
    margin: 0;
    font-size: 20px;
    color: var(--accent);
    text-shadow: 0 0 6px rgba(57, 255, 20, 0.5);
    letter-spacing: 0.5px;
  }
  .sub {
    margin-top: 4px;
    color: var(--dim);
    font-size: 12px;
  }
  .panel {
    border: 1px solid var(--border);
    background: var(--panel);
    border-radius: 4px;
    padding: 14px 16px;
    margin-bottom: 20px;
  }
  .panel h2 {
    margin: 0 0 10px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--green);
    border-bottom: 1px dashed var(--border);
    padding-bottom: 6px;
  }
  .row {
    display: flex;
    justify-content: space-between;
    padding: 3px 0;
  }
  .row .k { color: var(--dim); }
  .row .v { color: var(--accent); }
  .led {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    margin-right: 7px;
    animation: blink 1.6s steps(2, start) infinite;
  }
  @keyframes blink { 50% { opacity: 0.25; } }
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  label { color: var(--dim); font-size: 12px; }
  select, button {
    font-family: inherit;
    font-size: 13px;
    background: #06140a;
    color: var(--green);
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 3px;
    cursor: pointer;
  }
  select:focus, button:focus { outline: 1px solid var(--accent); }
  button {
    color: var(--accent);
    font-weight: bold;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  button:hover:not(:disabled) {
    background: var(--accent);
    color: #04120a;
    box-shadow: 0 0 10px rgba(57, 255, 20, 0.5);
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  #status {
    margin-top: 12px;
    color: var(--dim);
    min-height: 18px;
  }
  .proving { color: var(--accent); }
  .blink-cursor::after {
    content: "_";
    animation: blink 1s steps(2, start) infinite;
  }
  .ok { color: var(--green); font-weight: bold; }
  .bad { color: var(--red); font-weight: bold; }
  .results { margin-top: 8px; }
  .results.hidden { display: none; }
  .muted { color: var(--dim); font-size: 12px; }
  footer {
    margin-top: 24px;
    color: var(--dim);
    font-size: 11px;
    text-align: center;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>zk-optimization-kit // edge prover</h1>
    <div class="sub">Halo2 (IPA &middot; Pasta) on $35 hardware</div>
  </header>

  <section class="panel">
    <h2><span class="led"></span>hardware</h2>
    <div class="row"><span class="k">cpu</span><span class="v" id="hw-cpu">&hellip;</span></div>
    <div class="row"><span class="k">ram_mb</span><span class="v" id="hw-ram">&hellip;</span></div>
    <div class="row"><span class="k">temp_c</span><span class="v" id="hw-temp">&hellip;</span></div>
    <div class="muted" id="hw-stamp" style="margin-top:8px;">polling /api/hwinfo every 2s&hellip;</div>
  </section>

  <section class="panel">
    <h2>prove</h2>
    <div class="controls">
      <label for="circuit">circuit:</label>
      <select id="circuit">
        <option value="cubic">cubic &mdash; x³ + x + 5 = 35</option>
        <option value="poseidon">poseidon &mdash; hash preimage</option>
        <option value="merkle">merkle &mdash; Poseidon tree membership</option>
      </select>
      <button id="run">&gt; run proof</button>
    </div>
    <div id="status"></div>

    <div class="results hidden panel" id="results" style="margin-top:14px;background:#06120a;">
      <div class="row"><span class="k">setup_ms</span><span class="v" id="r-setup">&mdash;</span></div>
      <div class="row"><span class="k">proof_ms</span><span class="v" id="r-proof">&mdash;</span></div>
      <div class="row"><span class="k">verify_ms</span><span class="v" id="r-verify">&mdash;</span></div>
      <div class="row"><span class="k">proof_bytes</span><span class="v" id="r-bytes">&mdash;</span></div>
      <div class="row"><span class="k">verified</span><span class="v" id="r-verified">&mdash;</span></div>
      <div style="margin-top:10px;">
        <a id="dl" href="/api/proof" download="proof.bin" style="color:var(--dim);font-size:12px;text-decoration:none;">&#8595; download proof.bin</a>
      </div>
    </div>
  </section>

  <footer>real IPA proofs, no trusted setup &middot; running locally on this device</footer>
</div>

<script>
(function () {
  "use strict";

  function fmtMs(x) {
    return (typeof x === "number") ? x.toFixed(1) + " ms" : "—";
  }

  // ---- live hardware polling ----
  async function pollHw() {
    try {
      const res = await fetch("/api/hwinfo", { cache: "no-store" });
      const hw = await res.json();
      document.getElementById("hw-cpu").textContent = hw.cpu || "—";
      document.getElementById("hw-ram").textContent =
        (hw.ram_mb != null ? hw.ram_mb + " MB" : "—");
      document.getElementById("hw-temp").textContent =
        (hw.temp_c != null ? hw.temp_c.toFixed(1) + " °C" : "n/a");
      document.getElementById("hw-stamp").textContent =
        "last update " + new Date().toLocaleTimeString();
    } catch (e) {
      document.getElementById("hw-stamp").textContent = "hwinfo unreachable…";
    }
  }
  pollHw();
  setInterval(pollHw, 2000);

  // ---- run proof ----
  const btn = document.getElementById("run");
  const statusEl = document.getElementById("status");
  const results = document.getElementById("results");

  btn.addEventListener("click", async function () {
    const circuit = document.getElementById("circuit").value;
    btn.disabled = true;
    results.classList.add("hidden");
    statusEl.className = "proving blink-cursor";
    statusEl.textContent = "proving " + circuit + " ";

    const t0 = performance.now();
    try {
      const res = await fetch("/api/prove?circuit=" + encodeURIComponent(circuit), {
        method: "POST",
      });
      const run = await res.json();
      const wall = ((performance.now() - t0) / 1000).toFixed(2);

      document.getElementById("r-setup").textContent = fmtMs(run.setup_ms);
      document.getElementById("r-proof").textContent = fmtMs(run.proof_ms);
      document.getElementById("r-verify").textContent = fmtMs(run.verify_ms);
      document.getElementById("r-bytes").textContent =
        (run.proof_bytes != null ? run.proof_bytes + " bytes" : "—");

      const v = document.getElementById("r-verified");
      if (run.verified) {
        v.textContent = "✓";
        v.className = "ok";
      } else {
        v.textContent = "✗";
        v.className = "bad";
      }

      results.classList.remove("hidden");
      statusEl.className = "";
      statusEl.textContent = "done in " + wall + "s wall-clock.";
    } catch (e) {
      statusEl.className = "bad";
      statusEl.textContent = "request failed: " + e;
    } finally {
      btn.disabled = false;
    }
  });
})();
</script>
</body>
</html>
